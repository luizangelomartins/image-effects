<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CRT EFFECTS</title>

<!-- FAVICON -->
<link rel="icon" href="icons/favicon.ico" type="image/x-icon">

<style>
* {
    box-sizing: border-box;
}

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
    padding:10px;
}

/* CONTAINER DA IMAGEM */
.container{
    position:relative;
    width: 100%;
    overflow:hidden;
    border-radius:16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: width 0.25s ease, height 0.25s ease;
}

/* IMAGEM */
img{
    width:100%;
    height: 100%;
    display:block;
    object-position: center center;
}

.container.mode-916 img { object-fit: cover; }
.container.mode-desktop img { object-fit: contain; }

/* ==========================================
   BARRA DE GATILHO (SOBREPOSTA NA IMAGEM)
=========================================== */
.trigger-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 26px;
    background: rgba(255, 179, 0, 0.85);
    backdrop-filter: blur(4px);
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 90;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.trigger-bar:hover {
    background: rgba(255, 179, 0, 1);
}

.trigger-bar::before {
    content: "▲ AJUSTES ▲";
}

/* ==========================================
   MENU RETRÁTIL INFERIOR (DRAWER)
=========================================== */
.drawer {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 450px;
    background: rgba(26, 26, 26, 0.98);
    backdrop-filter: blur(15px);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    z-index: 999;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.7);
    /* Transição suave de opacidade quando ficar semi-transparente */
    transition: transform 0.4s cubic-bezier(0.1, -0.01, 0, 1), opacity 0.2s ease; 
}

.drawer.open {
    transform: translateX(-50%) translateY(0);
}

/* Classe aplicada via JavaScript ao arrastar o Slider */
.drawer.transparent-preview {
    opacity: 0.15; /* Deixa o menu quase invisível para ver a imagem de fundo */
    pointer-events: auto; /* Mantém o slider clicável */
}

.drawer-handle {
    width: 50px;
    height: 5px;
    background: #555;
    border-radius: 3px;
    margin: -10px auto 20px auto;
    cursor: pointer;
}

.controls-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
}

.row {
    display: flex;
    gap: 10px;
    width: 100%;
}

input, select {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #2a2a2a;
    color: white;
    font-size: 16px;
    flex: 1;
    width: 100%;
    outline: none;
}

button {
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #ffb300;
    color: black;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    flex: 1;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
}

button.active {
    background: #00e5ff;
}

.slider-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #2a2a2a;
    padding: 12px;
    border-radius: 12px;
    width: 100%;
}
.slider-header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #bbb;
}
.slider-container input[type="range"] {
    width: 100%;
    margin: 10px 0;
    display: block;
}

/* ==========================================
   EFEITOS CRT & GRAIN
=========================================== */
canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    opacity:0.22;
    mix-blend-mode:overlay;
    z-index: 5;
}

.container.crt{
    transform: perspective(800px) rotateX(2.2deg) scale(1.015);
    filter: contrast(1.38) saturate(1.35);
}

.crt-scanlines{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.38) 3px);
    opacity:0;
    z-index: 6;
}

.crt-flicker{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:rgba(255,255,255,0.02);
    opacity:0;
    animation:flicker 2.2s infinite;
    z-index: 7;
}

.crt img{ filter: contrast(1.42) saturate(1.3) brightness(1.1); }

.crt::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at center, rgba(255,255,255,0.06), rgba(0,0,0,0.72));
    mix-blend-mode:overlay; opacity:0.7; z-index: 8;
}

@keyframes flicker{
    0%{opacity:0.02} 50%{opacity:0.05} 100%{opacity:0.02}
}
</style>
</head>

<body>

<!-- Visualizador Central -->
<div class="container mode-916" id="container">
    <img id="img" src="https://luizangelomartins.github.io/photos-steam/banner.png" />
    <canvas id="grain"></canvas>
    <div class="crt-scanlines"></div>
    <div class="crt-flicker"></div>
    <div class="trigger-bar" onclick="toggleDrawer()"></div>
</div>

<!-- Menu Retrátil (Drawer) -->
<div class="drawer" id="menuDrawer">
    <div class="drawer-handle" onclick="toggleDrawer()"></div>
    
    <div class="controls-grid">
        <div class="row">
            <input id="url" placeholder="URL da imagem..." />
        </div>
        
        <div class="row">
            <select id="mode">
                <option value="grain">Film Grain</option>
                <option value="crt" selected>CRT</option>
            </select>
            <button id="btnCrop" class="active" onclick="toggleCrop()">Modo: 9:16</button>
        </div>

        <!-- Controle de Posição X (Com escutas de evento para detecção de arrasto) -->
        <div class="slider-container" id="sliderContainer">
            <div class="slider-header">
                <label for="posX">Posição Horizontal (X):</label>
                <span id="posValue">50%</span>
            </div>
            <input type="range" id="posX" min="0" max="100" value="50" 
                   oninput="updateXPosition(this.value)"
                   onmousedown="setMenuTransparent(true)"
                   onmouseup="setMenuTransparent(false)"
                   ontouchstart="setMenuTransparent(true)"
                   ontouchend="setMenuTransparent(false)">
        </div>
        
        <div class="row">
            <button style="background: #00e5ff;" onclick="apply(); toggleDrawer();">Aplicar Efeitos</button>
        </div>
    </div>
</div>

<script>
const img = document.getElementById("img");
const canvas = document.getElementById("grain");
const ctx = canvas.getContext("2d");
const container = document.getElementById("container");
const btnCrop = document.getElementById("btnCrop");
const sliderContainer = document.getElementById("sliderContainer");
const posXSlider = document.getElementById("posX");
const posValue = document.getElementById("posValue");
const menuDrawer = document.getElementById("menuDrawer");

let isCropped = true; 

function render(){
    const maxHeight = window.innerHeight - 40; 
    
    if (isCropped) {
        container.classList.remove("mode-desktop");
        container.classList.add("mode-916");
        
        const croppedWidth = (maxHeight * 9) / 16;
        container.style.height = maxHeight + "px";
        container.style.width = croppedWidth + "px";
    } else {
        container.classList.remove("mode-916");
        container.classList.add("mode-desktop");
        
        const imgRatio = (img.naturalWidth && img.naturalHeight) ? (img.naturalWidth / img.naturalHeight) : (16 / 9);
        const maxWidth = window.innerWidth - 20;
        
        let targetHeight = maxHeight;
        let targetWidth = maxHeight * imgRatio;
        
        if (targetWidth > maxWidth) {
            targetWidth = maxWidth;
            targetHeight = maxWidth / imgRatio;
        }
        
        container.style.width = targetWidth + "px";
        container.style.height = targetHeight + "px";
    }

    setTimeout(() => {
        const r = container.getBoundingClientRect();
        canvas.width = r.width;
        canvas.height = r.height;
        grain();
    }, 40);
}

function grain(){
    if (canvas.width === 0 || canvas.height === 0) return;
    const w = canvas.width;
    const h = canvas.height;
    const data = ctx.createImageData(w,h);
    const d = data.data;

    for(let i=0;i<d.length;i+=4){
        const n = Math.random()*255;
        const v = n > 245 ? 255 : n * 0.5;
        d[i]=d[i+1]=d[i+2]=v;
        d[i+3]=255;
    }
    ctx.putImageData(data,0,0);
}

img.onload = render;
window.addEventListener("resize", render);

function toggleDrawer() {
    menuDrawer.classList.toggle("open");
}

// Controla a transparência do menu ao interagir com o slider
function setMenuTransparent(isDragging) {
    if (isDragging) {
        menuDrawer.classList.add("transparent-preview");
    } else {
        menuDrawer.classList.remove("transparent-preview");
    }
}

function toggleCrop() {
    isCropped = !isCropped;
    
    if(isCropped) {
        btnCrop.classList.add("active");
        btnCrop.innerText = "Modo: 9:16";
        sliderContainer.style.display = "flex";
    } else {
        btnCrop.classList.remove("active");
        btnCrop.innerText = "Modo: Desktop";
        sliderContainer.style.display = "none";
        img.style.objectPosition = "center center";
        posXSlider.value = 50;
        posValue.innerText = "50%";
    }
    render();
}

function updateXPosition(val) {
    posValue.innerText = val + "%";
    img.style.objectPosition = `${val}% center`;
}

function setMode(mode){
    container.classList.remove("crt");
    document.querySelector(".crt-scanlines").style.opacity = 0;
    document.querySelector(".crt-flicker").style.opacity = 0;
    canvas.style.opacity = 0;

    if(mode === "grain") canvas.style.opacity = 0.22;

    if(mode === "crt"){
        container.classList.add("crt");
        document.querySelector(".crt-scanlines").style.opacity = 0.88;
        document.querySelector(".crt-flicker").style.opacity = 0.75;
        canvas.style.opacity = 0.06;
    }
}

function apply(){
    const url = document.getElementById("url").value.trim();
    const mode = document.getElementById("mode").value;

    if(url) img.src = url;
    setMode(mode);
    render();
}

setMode("crt");
if(img.complete) render();
</script>

</body>
</html>
